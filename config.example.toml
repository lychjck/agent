[paths]
download_dir = "/Users/liyanran/github/stock/downloads"
report_dir = "/Users/liyanran/github/stock/reports"
archive_dir = "/Users/liyanran/github/stock/data/holdings"

[ledger]
# 填你的投资账本地址。
url = "https://example.com/your-investment-ledger"
# 当前仅支持 tzzb_api 模式（通过网络请求获取持仓）
mode = "tzzb_api"
curl_file = ".tzzb-curl"
cookie_file = ""
cookie = ""
uid = ""
api_timeout_seconds = 30

[market]
provider = "sina"
history_days = 260
timeout_seconds = 15

[analysis]
min_history_days = 80
loss_alert_pct = -8.0
gain_trim_pct = 20.0
max_single_position_pct = 35.0

[profile]
base_currency = "CNY"
risk_level = "balanced"
investment_style = "long_term_etf"
allow_external_search = false
allow_external_llm = true

[policy]
cash_min_pct = 5
max_single_position_pct = 20
max_sector_pct = 35
max_theme_pct = 25
max_unknown_classification_pct = 10
loss_alert_pct = -8
gain_trim_pct = 20
rebalance_drift_pct = 5
rebalance_target_buffer_pct = 2

[allocation_targets]
broad_index = 40
sector_equity = 25
bond = 15
overseas = 10
commodity = 5
cash = 5

[classification]
mode = "hybrid"
require_user_review_below_confidence = 0.75
cache_ttl_days = 90

[classification.llm]
enabled = true
client = "urllib"
base_url = "http://10.33.207.193:1234/v1"
model = "google/gemma-4-31b"
temperature = 0.0
timeout_seconds = 120
max_tokens = 2048
stream = false
disable_thinking = true

[classifications."510300"]
asset_class = "broad_index"
sector = ""
theme = "csi300"
region = "china_a"
strategy = "passive_index"
reviewed_by_user = true

[search]
enabled = true
provider = "opencli"
cache_dir = "data/research"
timeout_seconds = 20
max_results = 5
search_depth = "basic"
# 可选：none/day/week/month/year。opencli 会映射为 --time，Tavily 会映射为 time_range，Brave 会映射为 freshness。
freshness = "year"
start_date = ""
end_date = ""
include_raw_content = false
max_stored_content_chars = 4000
api_key_env = ""
manual_results_file = "data/research/manual_search_results.json"

[search.providers.tavily]
enabled = false
api_key_env = "TAVILY_API_KEY"
search_depth = "basic"
topic = "finance"

[search.providers.brave]
enabled = false
api_key_env = "BRAVE_SEARCH_API_KEY"

[search.providers.opencli]
enabled = true
command_path = "opencli"
site = "duckduckgo"
command = "search"
region = "cn-zh"
lang = ""
profile = ""
window = "background"
site_session = "ephemeral"

[search.providers.opencli.allowed_commands]
duckduckgo = "search,suggest"
google = "search,news,suggest,trends"
brave = "search"
yahoo = "search"
eastmoney = "announcement,convertible,etf,holders,index-board,kline,kuaixun,longhu,money-flow,northbound,quote,rank,sectors"
sinafinance = "news,stock"
xueqiu = "search,stock,kline,hot-stock"
"yahoo-finance" = "quote"
barchart = "quote,options,greeks"
bloomberg = "main,markets,economics,industries,tech,politics"
reuters = "search,article-detail"
web = "read"

[search.source_tiers]
tier1 = "sse.com.cn,szse.cn,csindex.com.cn,cnindex.com.cn"
tier2 = "eastmoney.com,10jqka.com.cn,fund.eastmoney.com"

[agent]
enabled = true
strict_json = true
llm_can_create_new_actions = false
save_snapshots = true
snapshot_dir = "data/state"
tool_agent_enabled = true
tool_agent_default = true
max_tool_turns = 12
max_tool_calls = 16
save_traces = true
trace_dir = "data/state/agent_traces"
allow_external_search_tools = false

[skills]
enabled = true
install_dir = "data/skills"
roots = []
max_skill_chars = 20000
install_timeout_seconds = 30
allow_url_install = true

[llm]
enabled = true
client = "openai"
base_url = "http://10.33.207.193:1234/v1"
model = "google/gemma-4-26b-a4b"
api_key_env = ""
api_key_file = ""
temperature = 0.2
timeout_seconds = 900
max_tokens = 65536
stream = true
disable_thinking = false
reasoning_effort = ""
structured_output = "auto"
supports_response_format = false
repair_attempts = 1
max_context_positions = 50
log_payload = false
